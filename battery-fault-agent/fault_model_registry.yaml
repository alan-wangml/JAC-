    version: "V2.0"
    skill: alarm-miss-analysis
    status: placeholder
    model_path: null
    design_doc: "vdiff_parking自放电/README.md"
    keywords: [parking自放电, 静置自放电, 去极化]
    notes: "基于 t0-t1 去极化后压差判定自放电异常。"

  # ── 压差统计模型 ────────────────────────────────────────────────
  vdiff_stat:
    name: 压差离群_统计模型
    algorithm: ap_vdiff_stat
    version: "V1.0"
    skill: alarm-miss-analysis
    status: placeholder
    model_path: null
    design_doc: "vdiff_统计模型/README.md"
    keywords: [压差统计, 压差分位数, 压差香农熵]
    notes: "Algorithm_f0a173ec73，IQR + 熵双条件判定。"

  # ── AlphaQ ──────────────────────────────────────────────────────
  vdiff_alphaq:
    name: 压差离群_AlphaQ
    algorithm: ap_alphaq
    version: "V1.0"
    skill: alarm-miss-analysis
    status: placeholder
    model_path: null
    design_doc: "vdiff_AlphaQ/README.md"
    keywords: [AlphaQ, 排名变化, 70kWh]
    notes: "仅适用 70kWh 电池，充电排名变化判定。"

  # ── 压差数理模型 ────────────────────────────────────────────────
  vdiff_math:
    name: 压差离群_数理模型
    algorithm: ap_vdiff_math
    version: "V2.0"
    skill: alarm-miss-analysis

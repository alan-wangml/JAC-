# 电池安全故障模型注册表
# 用途：battery-fault-agent 基于此表识别失效类型，分发至对应算法 Skill
# 最后更新：2026-05-22
# 维护说明：新增算法时，在 failure_types 下添加新条目，status 设为 placeholder，
#           待 Python 模型和专属 Skill 开发完成后改为 ready

workspace_skills_base: "算法调优"    # 所有 Skill 目录的相对根（相对 workspace）
workspace_models_base: "算法调优"    # 所有模型文件的相对根

# ═══════════════════════════════════════════════════════════════════
#  实时算法
# ═══════════════════════════════════════════════════════════════════

failure_types:

  # ── 热失控（ap16）────────────────────────────────────────────────
  thermal_runaway:
    name: 热失控
    algorithm: ap16
    version: "V1.0"
    skill: ap16_热失控实时              # Skill 目录（在 workspace_skills_base 下，含 SKILL.md）
    status: ready                      # ready | placeholder
    model_path: "ap16_热失控实时/thermal_runaway_realtime.py"
    design_doc: "ap16_热失控实时/热失控实时算法设计文档.md"
    keywords: [热失控, 过温, 温升异常, 起火, 冒烟, 高温, 温度突变, thermal runaway]
    auto_detect_signals:
      max_temp_gt: 55
      temp_diff_gt: 30
      min_volt_lt: 1300
      max_volt_gt: 4500
      volt_diff_gt: 300
    notes: >
      ap16 实时帧级检测。触发组合：C1（温度×电压）、C2（任意×B5绝缘）、C3（任意×采样异常×iso≠0）。
      2026-05-22 工作簿2分析建议新增 C4（B3独立）和 C5（大压差独立）。

  # ── 绝缘异常 lv2（ap19）──────────────────────────────────────────
  insulation_lv2:
    name: 绝缘异常_lv2
    algorithm: ap19
    version: null
    skill: alarm-miss-analysis
    status: placeholder
    model_path: null
    design_doc: "ap19_绝缘异常_lv2/README.md"
    keywords: [绝缘异常, 绝缘电阻, 绝缘故障, 漏电, iso异常, 绝缘下降, lv2, 二级]
    auto_detect_signals:
      iso_resistance_lt: 100
    notes: "实时告警，lv2 二级响应。暂无 Python 模型，分析时需用户提供阈值条件。"

  # ── 绝缘异常 lv3（ap20）──────────────────────────────────────────
  insulation_lv3:
    name: 绝缘异常_lv3
    algorithm: ap20
    version: null
    skill: alarm-miss-analysis
    status: placeholder
    model_path: null
    design_doc: "ap20_绝缘异常_lv3/README.md"
    keywords: [绝缘异常_lv3, 三级绝缘, 绝缘持续异常, lv3]
    auto_detect_signals:
      iso_resistance_lt: 100
    notes: "实时告警，lv3 三级响应，绝缘未恢复持续时间触发。"

  # ── 实时隐患告警（ap21）──────────────────────────────────────────
  realtime_hazard:
    name: 实时隐患告警
    algorithm: ap21
    version: "V1.0"
    skill: alarm-miss-analysis
    status: placeholder
    model_path: null
    design_doc: "ap21_实时隐患告警/README.md"
    keywords: [实时隐患, 隐患告警, 综合告警, 多指标异常]
    auto_detect_signals:
      multi_signal: true
    notes: "100帧滑动窗口，6类指标加权求和，综合因子>10触发。"

  # ── 低电量异常（otr lv1/2/3）────────────────────────────────────
  low_soc_lv1:
    name: 低电量异常_lv1
    algorithm: otr_low_soc
    version: "V1.0"
    skill: alarm-miss-analysis
    status: placeholder
    model_path: null
    design_doc: "otr_低电量_lv1/README.md"
    keywords: [低电量, 低电, 过放, 深放, lv1]
    notes: "离线预警，基础低电量异常检测。"

  low_soc_lv2:
    name: 低电量异常_lv2
    algorithm: otr_low_soc
    version: "V1.0"
    skill: alarm-miss-analysis
    status: placeholder
    model_path: null
    design_doc: "otr_低电量_lv2/README.md"
    keywords: [低电量_lv2, 中等严重低电]
    notes: "Algorithm_4972a5f265，中等严重程度。"

  low_soc_lv3:
    name: 低电量异常_lv3
    algorithm: otr_low_soc
    version: "V1.0"
    skill: alarm-miss-analysis
    status: placeholder
    model_path: null
    design_doc: "otr_低电量_lv3/README.md"
    keywords: [低电量_lv3, 严重低电, 三级低电]
    notes: "Algorithm_4972a5f265，严重程度，三级告警。"

  # ── 换电站实时自放电 ──────────────────────────────────────────────
  station_self_discharge:
    name: 换电站实时自放电
    algorithm: otr_selfdch_station
    version: "V1.0"
    skill: alarm-miss-analysis
    status: placeholder
    model_path: null
    design_doc: "otr_换电站实时自放电/README.md"
    keywords: [换电站自放电, 站端自放电, 端云结合, 自放电实时]
    auto_detect_signals:
      volt_drop_rate_lt: 1.5
      outlier_rate_gt: 0.66
    notes: "仅适用 NCM 电池，充电截止后 t0-t1 5分钟压降判断。"

# ═══════════════════════════════════════════════════════════════════
#  预警层 - 压差离群族
# ═══════════════════════════════════════════════════════════════════

  # ── 压差离群 LFP（ap2）──────────────────────────────────────────

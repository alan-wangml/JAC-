    auto_detect_signals:
      volt_diff_gt: 100
    notes: "充电事件，大压差次数 > 1 触发。"

  # ── parking 自放电预警 ──────────────────────────────────────────
  vdiff_parking_selfdch:
    name: 压差离群_parking自放电

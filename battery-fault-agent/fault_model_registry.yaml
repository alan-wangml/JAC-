    auto_detect_signals:
      volt_diff_gt: 16
    notes: "适用 NCM 电芯，基于中位数偏离判定，偏离阈值 0.07。"

  # ── 压差偏高（ap8）──────────────────────────────────────────────
  vdiff_high:
